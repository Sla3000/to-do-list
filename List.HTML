<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Lista de Tarefa</h1>
        <nav>
            <a href="#inicio">inicio</a>
            <a href="#listasTarefas">Tarefa</a>
            <a href="#contato">Contato</a>
        </nav>
    </header>

    <div id="inicio" class="container">
        <h2>adicionar nova tarefa</h2>
        <div>
            <input type="text" placeholder="Digite uma tarefa" id="tarefaInput">
            <button onclick="adicionarTarefa()">Adicionar</button>
        </div>
        <ul id="listaTarefas"></ul>
    </div>

    <footer id="contato">
        <p>&copy; 2026 SENAI. Todos os direitos reservados</p>
    </footer>

    <script>
        let tarefas = [];

        function adicionarTarefa(){
            const input = document.getElementById('tarefaInput');
            const tarefa = input.value.trim();
            if(tarefa){
                tarefas.push(tarefa);
                input.value = '';
                atualizarLista();
            }
        }

        function removerTarefa(index){
            tarefas.splice(index, 1);
            atualizarLista();
        }

        function editarTarefa(index){
            const nova = prompt("Editar tarefa:", tarefas[index]);
            if(nova !== null && nova.trim() !== ''){
                tarefas[index] = nova.trim();
                atualizarLista();
            }
        }

        function atualizarLista(){
            const lista = document.getElementById('listaTarefas');
            lista.innerHTML = '';
            tarefas.forEach((tarefa, index) =>{
                const li = document.createElement('li');
                li.innerHTML = `${tarefa}
                <button onclick="editarTarefa(${index})">Editar</button>
                <button onclick="removerTarefa(${index})">Remover</button>`;
                lista.appendChild(li);
            });
        }
    </script>
</body>
</html>
